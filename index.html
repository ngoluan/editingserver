<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opencode Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922;
}
body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--text2); font-weight: 400; }

.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px;
  border-radius: 6px; border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { filter: brightness(1.1); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 5px 8px; font-size: 14px; line-height: 1; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px; padding: 16px 24px;
}
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; cursor: default; transition: border-color 0.15s;
}
.card:hover { border-color: #484f58; }
.card.active { border-color: var(--accent); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.card-header .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot.clean { background: var(--green); }
.dot.dirty { background: var(--yellow); }
.dot.norepo { background: var(--text2); }
.card-header .name { font-weight: 600; font-size: 15px; }
.card-header .branch { font-size: 12px; color: var(--text2); margin-left: auto; }
.card-stats { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--text2); }
.card-stats span { display: flex; align-items: center; gap: 4px; }
.card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.card-path { font-size: 11px; color: var(--text2); margin-bottom: 10px; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.detail-panel {
  display: none; flex-direction: column; flex: 1; min-height: 0;
  border-top: 1px solid var(--border); background: var(--bg2);
}
.detail-panel.open { display: flex; }
.detail-header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 24px; background: var(--bg); border-bottom: 1px solid var(--border);
}
.detail-header .close-btn { font-size: 18px; cursor: pointer; color: var(--text2); padding: 2px 6px; border-radius: 4px; }
.detail-header .close-btn:hover { color: var(--text); background: var(--bg3); }
.detail-header .name { font-weight: 600; }

.toolbar {
  display: flex; align-items: center; gap: 0;
  background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 16px;
}
.toolbar button {
  background: none; border: none; color: var(--text2); padding: 10px 16px;
  cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent;
  transition: all 0.15s; font-family: inherit;
}
.toolbar button:hover { color: var(--text); }
.toolbar button.active { color: var(--accent); border-bottom-color: var(--accent); }
.detail-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.tab { display: none; }
.tab.active { display: block; }

h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

input, textarea, select {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; outline: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 100px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; }
pre.output {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 12px; overflow: auto; max-height: 350px; font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1.5; white-space: pre-wrap; word-break: break-all;
}
.stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; min-width: 100px; border: 1px solid var(--border); }
.stat .val { font-size: 22px; font-weight: 700; }
.stat .label { font-size: 11px; color: var(--text2); margin-top: 2px; }
.action-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.action-row .spacer { flex: 1; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  font-weight: 600; background: var(--bg3);
}
.badge-green { background: #1a3a2a; color: var(--green); }
.badge-red { background: #3a1a1a; color: var(--red); }
.badge-blue { background: #1a2a3a; color: var(--accent); }
.status-line { font-size: 12px; color: var(--text2); padding: 8px 0; display: flex; gap: 12px; align-items: center; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--text2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.session-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); font-size: 12px;
}
.session-item:last-child { border-bottom: none; }
.session-item .time { color: var(--text2); min-width: 140px; font-size: 11px; }
.session-item .action { font-weight: 600; min-width: 70px; }
.session-item .action.combine { color: var(--accent); }
.session-item .action.commit { color: var(--green); }
.session-item .action.merge { color: var(--yellow); }
.session-item .action.patch_save { color: var(--text2); }
.session-item .action.apply_patch { color: var(--green); }
.session-item .action.apply_opencode { color: var(--accent); }
.session-item .detail { color: var(--text2); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  width: 500px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px;
}
.modal h2 { margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-row { display: flex; gap: 8px; }
.form-row input { flex: 1; }
.form-row .btn { flex-shrink: 0; }
.form-hint { font-size: 11px; color: var(--text2); margin-top: 4px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.detect-result { margin: 12px 0; padding: 10px 14px; background: var(--bg); border-radius: 6px; font-size: 12px; display: none; }

.autocomplete-wrap { position: relative; flex: 1; }
.autocomplete-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 0 0 6px 6px;
  max-height: 200px; overflow-y: auto; display: none;
}
.autocomplete-dropdown.open { display: block; }
.autocomplete-dropdown div {
  padding: 6px 12px; cursor: pointer; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
  border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.autocomplete-dropdown div:last-child { border-bottom: none; }
.autocomplete-dropdown div:hover, .autocomplete-dropdown div.selected { background: var(--bg3); color: var(--accent); }

.empty-state {
  text-align: center; padding: 60px 24px; color: var(--text2);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.session-progress {
  margin-top: 12px; padding: 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; max-height: 400px; overflow-y: auto; display: none;
}
.session-progress.open { display: block; }
.session-progress h3 {
  font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px;
}
.session-progress .todo-item {
  display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 12px;
}
.session-progress .todo-item.done { color: var(--green); text-decoration: line-through; }
.session-progress .todo-item.pending { color: var(--text2); }
.session-progress .msg-log { max-height: 500px; overflow-y: auto; }
.session-progress .msg-entry {
  padding: 8px; margin-bottom: 6px; border-radius: 6px; font-size: 12px;
  line-height: 1.5; word-break: break-word;
}
.session-progress .msg-entry.user { background: var(--bg3); }
.session-progress .msg-entry.assistant { background: #161b33; border: 1px solid #252d4a; }
.session-progress .msg-entry.tool { background: #1a1a2e; }
.session-progress .msg-entry .role { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.session-progress .msg-entry.user .role { color: var(--green); }
.session-progress .msg-entry.assistant .role { color: var(--accent); }
.session-progress .msg-entry.tool .role { color: var(--yellow); }
.session-progress .msg-entry .time { color: var(--text2); font-size: 10px; margin-left: 8px; }
.session-progress .msg-entry .text { margin-top: 4px; color: var(--text); white-space: pre-wrap; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
.session-progress .msg-entry .reasoning {
  margin-top: 4px; padding: 6px 8px; background: rgba(88,166,255,0.08); border-left: 2px solid var(--accent);
  border-radius: 4px; font-size: 11px; color: var(--text2); font-style: italic;
}

/* Dashboard shell */
.header { min-height: 68px; padding: 14px 28px; background: #111720; }
.brand-kicker { display:block; color:var(--accent); font-size:10px; letter-spacing:1.8px; text-transform:uppercase; margin-bottom:2px; }
.dashboard-summary { display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:12px; padding:16px 24px; }
.summary-tile { background:linear-gradient(145deg,#171e28,#121821); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
.summary-tile .value { font-size:22px; font-weight:750; letter-spacing:-.5px; }
.summary-tile .caption { color:var(--text2); font-size:11px; margin-top:2px; }
.workspace { display:grid; grid-template-columns:minmax(300px,360px) minmax(0,1fr); gap:16px; padding:0 24px 24px; flex:1; min-height:0; }
.project-rail { background:var(--bg2); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
.rail-heading { padding:16px 16px 8px; font-weight:650; }
.card-grid { display:flex; flex-direction:column; padding:8px; overflow:auto; gap:8px; }
.card { border-radius:10px; padding:14px; }
.detail-panel { border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--bg2); min-height:0; }
.detail-panel.open { display:flex; }
.workspace-empty { display:flex; align-items:center; justify-content:center; color:var(--text2); border:1px dashed var(--border); border-radius:12px; padding:40px; text-align:center; }
.job-banner { display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(88,166,255,.08); border:1px solid rgba(88,166,255,.25); border-radius:8px; margin-bottom:12px; }
@media (max-width: 850px) {
  body { height:auto; min-height:100vh; }
  .dashboard-summary { grid-template-columns:repeat(2,1fr); }
  .workspace { grid-template-columns:1fr; }
  .project-rail { max-height:420px; }
  .detail-panel { min-height:620px; }
}
</style>
</head>
<body>

<div class="header">
  <h1><small class="brand-kicker">Workspace control</small>opencode <span>dashboard</span></h1>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Project</button>
</div>

<div class="dashboard-summary" id="dashboard-summary"></div>
<div class="workspace">
<aside class="project-rail">
  <div class="rail-heading">Projects</div>
  <div id="card-status" class="status-line" style="padding:4px 16px;min-height:24px"></div>
  <div id="card-grid" class="card-grid"></div>
</aside>
<div class="workspace-empty" id="workspace-empty">Select a project to manage combine scripts, patches, Git, and OpenCode sessions.</div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <span class="close-btn" onclick="closeDetail()">✕</span>
    <span class="name" id="detail-name"></span>
  </div>
  <div class="toolbar">
    <button class="active" data-tab="combine">Combine</button>
    <button data-tab="patch">Patch</button>
    <button data-tab="git">Git</button>
    <button data-tab="sessions">Sessions</button>
  </div>
  <div class="detail-body">
    <div class="tab active" id="tab-combine"></div>
    <div class="tab" id="tab-patch"></div>
    <div class="tab" id="tab-git"></div>
    <div class="tab" id="tab-sessions"></div>
  </div>
</div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add Project</h2>
    <div class="form-group">
      <label>Project name</label>
      <input type="text" id="new-name" placeholder="e.g. my-project" />
    </div>
    <div class="form-group">
      <label>Folder path</label>
  <div class="form-row">
    <div class="autocomplete-wrap">
      <input type="text" id="new-path" placeholder="/home/user/my-project" autocomplete="off" oninput="onPathInput()" onkeydown="onPathKeydown(event)" onblur="hideAutocomplete()" />
      <div class="autocomplete-dropdown" id="path-dropdown"></div>
    </div>
    <button class="btn" onclick="openFolderPicker()">📁 Browse</button>
    <button class="btn" onclick="detectFolder()">Detect</button>
  </div>
      <div class="form-hint">Type a path — suggestions appear as you type</div>
    </div>
    <div class="detect-result" id="detect-result"></div>
    <div class="form-group" id="combine-script-group" style="display:none">
      <label>Combine script (optional)</label>
      <input type="text" id="new-script" placeholder="/path/to/combine-script.sh" />
      <div class="form-hint">Leave empty to auto-generate a basic script</div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<input type="file" id="card-patch-input" accept=".patch,.txt,.diff" style="display:none" onchange="onCardPatchSelected(event)" />
<div class="modal-overlay" id="folder-modal">
  <div class="modal" style="width:600px">
    <h2>Browse Folders</h2>
    <div class="form-group">
      <label>Current path</label>
      <div class="form-row">
        <input type="text" id="browse-path-readonly" readonly style="flex:1;background:var(--bg3)" />
        <button class="btn btn-sm" onclick="browseGoUp()">⬆ Up</button>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <button class="btn btn-sm" onclick="browseRoot('/')">/</button>
      <button class="btn btn-sm" onclick="browseRoot('/Users')">/Users</button>
      <button class="btn btn-sm" onclick="browseRoot('/etc')">/etc</button>
    </div>
    <div id="folder-list" style="max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;background:var(--bg);padding:4px 0;font-family:'SF Mono','Fira Code',monospace;font-size:12px"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeFolderPicker()">Cancel</button>
      <button class="btn btn-primary" onclick="selectFolder()">Select</button>
    </div>
  </div>
</div>

<script>
const state = { projects: [], activeProject: null, activeTab: 'combine' };

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  return r.json();
}

async function loadProjects() {
  const data = await api('GET', '/api/projects');
  state.projects = data.projects || [];
  renderCards();
  if (state.activeProject) {
    const stillExists = state.projects.find(p => p.id === state.activeProject.id);
    if (stillExists) { openDetail(stillExists.id); }
    else { closeDetail(); }
  }
}

function renderCards() {
  const grid = document.getElementById('card-grid');
  const summary = document.getElementById('dashboard-summary');
  const totalLines = state.projects.reduce((n, p) => n + (p.combinedLines || 0), 0);
  const activeJobs = state.projects.filter(p => p.opencodeSessionId).length;
  const dirty = state.projects.filter(p => p.gitDirty).length;
  summary.innerHTML = `
    <div class="summary-tile"><div class="value">${state.projects.length}</div><div class="caption">Projects</div></div>
    <div class="summary-tile"><div class="value">${totalLines.toLocaleString()}</div><div class="caption">Combined lines</div></div>
    <div class="summary-tile"><div class="value">${dirty}</div><div class="caption">Modified repos</div></div>
    <div class="summary-tile"><div class="value">${activeJobs}</div><div class="caption">OpenCode sessions</div></div>`;
  if (!state.projects.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>No projects yet. Click <strong>+ Add Project</strong> to get started.</p></div>`;
    return;
  }
  grid.innerHTML = state.projects.map(p => {
    const dot = !p.gitRepo ? 'norepo' : p.gitDirty ? 'dirty' : 'clean';
    const active = state.activeProject?.id === p.id;
    const lastSession = p.lastAction || '';
    return `<div class="card${active ? ' active' : ''}" onclick="openDetail('${p.id}')">
      <div class="card-header">
        <span class="dot ${dot}"></span>
        <span class="name">${p.name}</span>
        <span class="branch">${p.gitBranch || '—'}</span>
      </div>
      <div class="card-stats">
        ${p.combinedExists ? `<span>📄 ${p.combinedLines.toLocaleString()} lines</span>` : '<span>— no source —</span>'}
        ${p.patchExists ? '<span>🩹 patch saved</span>' : ''}
      </div>
      <div class="card-path">${p.path}</div>
      <div class="card-actions">
        <button class="btn btn-sm" onclick="event.stopPropagation();runQuickCombine('${p.id}')">⟳ Combine</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();uploadAndApplyPatch('${p.id}')">🩹 Patch</button>
        <button class="btn btn-sm" onclick="event.stopPropagation();openDetail('${p.id}','git')">⎇ Git</button>
        <button class="btn btn-sm" style="color:var(--red)" onclick="event.stopPropagation();deleteProject('${p.id}','${p.name}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function openDetail(id, tab) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  state.activeProject = p;
  const panel = document.getElementById('detail-panel');
  document.getElementById('workspace-empty').style.display = 'none';
  document.getElementById('detail-name').textContent = `${p.name}  ·  ${p.gitBranch || 'no git'}`;
  panel.classList.add('open');
  renderCards();
  tab = tab || 'combine';
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabBtn = document.querySelector(`.toolbar button[data-tab="${tab}"]`);
  if (tabBtn) tabBtn.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  state.activeTab = tab;
  if (tab === 'combine') renderCombine();
  else if (tab === 'patch') renderPatch();
  else if (tab === 'git') renderGit();
  else if (tab === 'sessions') renderSessions();
}

function closeDetail() {
  state.activeProject = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('workspace-empty').style.display = 'flex';
  renderCards();
}

document.querySelector('.toolbar').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  state.activeTab = btn.dataset.tab;
  document.getElementById(`tab-${state.activeTab}`).classList.add('active');
  if (state.activeTab === 'combine') renderCombine();
  else if (state.activeTab === 'patch') renderPatch();
  else if (state.activeTab === 'git') renderGit();
  else if (state.activeTab === 'sessions') renderSessions();
});

// ── Combine tab ──
function renderCombine() {
  const p = state.activeProject;
  if (!p) return;
  const el = document.getElementById('tab-combine');
  el.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="val" id="c-lines">${p.combinedLines.toLocaleString()}</div><div class="label">Lines</div></div>
      <div class="stat"><div class="val" id="c-size">${p.combinedSize ? (p.combinedSize / 1024).toFixed(1) + ' KB' : '—'}</div><div class="label">Size</div></div>
      <div class="stat"><div class="val" id="c-exists">${p.combinedExists ? 'Yes' : 'No'}</div><div class="label">Exists</div></div>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="btn-combine" onclick="runCombine()">⟳ Combine Source</button>
      <button class="btn" onclick="updateCombineScript()">🔍 Smart Update</button>
      <button class="btn" onclick="aiSmartUpdate()">🤖 AI Smart Update</button>
      <button class="btn" onclick="copySource()">📋 Copy All</button>
      <span id="combine-status" class="status-line"></span>
    </div>
    <div id="combine-progress" class="session-progress"></div>
    <h3>Combined Source Preview</h3>
    <pre class="output" id="source-output">Loading...</pre>
  `;
  loadSourcePreview();
}

async function loadSourcePreview() {
  const p = state.activeProject;
  if (!p) return;
  const data = await api('GET', `/api/projects/${p.id}/source`);
  const el = document.getElementById('source-output');
  if (data.content) {
    const lines = data.content.split('\n');
    const preview = lines.length > 200 ? lines.slice(0, 200).join('\n') + `\n\n... (${data.lines - 200} more lines)` : data.content;
    el.textContent = preview;
  } else {
    el.textContent = '(no combined source — run combine first)';
  }
}

function downloadFile(content, filename) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function fetchAndDownload(id) {
  const src = await api('GET', `/api/projects/${id}/source`);
  if (src.content) downloadFile(src.content, `${id}_combined-source.txt`);
}

async function runCombine() {
  const p = state.activeProject;
  if (!p) return;
  const btn = document.getElementById('btn-combine');
  const status = document.getElementById('combine-status');
  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> Combining...';
  const data = await api('POST', `/api/projects/${p.id}/combine`);
  btn.disabled = false;
  if (data.success) {
    p.combinedLines = data.lines; p.combinedSize = data.size; p.combinedExists = true;
    document.getElementById('c-lines').textContent = data.lines.toLocaleString();
    document.getElementById('c-size').textContent = data.size ? (data.size / 1024).toFixed(1) + ' KB' : '—';
    document.getElementById('c-exists').textContent = 'Yes';
    status.innerHTML = `<span class="badge badge-green">Done</span> ${data.lines.toLocaleString()} lines`;
    fetchAndDownload(p.id);
    loadSourcePreview();
    loadProjects();
  } else {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.stderr || data.error || 'Unknown'}`;
  }
}

async function copySource() {
  const p = state.activeProject;
  if (!p) return;
  const data = await api('GET', `/api/projects/${p.id}/source`);
  if (data.content) {
    await navigator.clipboard.writeText(data.content);
    const el = document.getElementById('combine-status');
    el.innerHTML = '<span class="badge badge-blue">Copied</span>';
    setTimeout(() => el.innerHTML = '', 2000);
  }
}

async function updateCombineScript() {
  const p = state.activeProject;
  if (!p) return;
  const status = document.getElementById('combine-status');
  status.innerHTML = '<span class="spinner"></span> Scanning project...';
  const data = await api('POST', `/api/projects/${p.id}/update-combine-script`);
  if (data.error) {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.error}`;
    return;
  }
  const parts = [];
  if (data.ignores && data.ignores.length) parts.push(`ignored: ${data.ignores.join(', ')}`);
  if (data.extensions && data.extensions.length) parts.push(`sources: ${data.extensions.join(', ')}`);
  if (data.gitignorePatterns && data.gitignorePatterns.length) parts.push(`+ ${data.gitignorePatterns.length} .gitignore patterns`);
  status.innerHTML = `<span class="badge badge-green">Updated</span> ${parts.join(' · ')}`;
  setTimeout(() => status.innerHTML = '', 6000);
}

async function aiSmartUpdate() {
  const p = state.activeProject;
  if (!p) return;
  const status = document.getElementById('combine-status');
  status.innerHTML = '<span class="spinner"></span> Asking OpenCode Web API to build wildcard rules...';
  const data = await api('POST', `/api/projects/${p.id}/ai-smart-update`);
  if (data.success) {
    p.opencodeSessionId = data.sessionId;
    status.innerHTML = `<span class="badge badge-green">Running</span> Wildcard/rules update · ${data.sessionId.slice(-8)}`;
    const progress = document.getElementById('combine-progress');
    progress.className = 'session-progress open';
    pollSessionProgress(p.id, progress);
  } else {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.error || 'Failed'}`;
  }
}

async function runQuickCombine(id) {
  const data = await api('POST', `/api/projects/${id}/combine`);
  if (data.success) fetchAndDownload(id);
  await loadProjects();
}

async function quickCopy(id) {
  const data = await api('GET', `/api/projects/${id}/source`);
  if (data.content) await navigator.clipboard.writeText(data.content);
}

let _cardPatchId = null;

function uploadAndApplyPatch(id) {
  _cardPatchId = id;
  document.getElementById('card-patch-input').click();
}

function setCardStatus(html) {
  const el = document.getElementById('card-status');
  if (el) el.innerHTML = html;
}

async function onCardPatchSelected(event) {
  const file = event.target.files[0];
  if (!file || !_cardPatchId) return;
  const id = _cardPatchId;
  event.target.value = '';
  _cardPatchId = null;
  setCardStatus('<span class="spinner"></span> Sending to opencode web API...');
  const reader = new FileReader();
  reader.onload = async (e) => {
    const content = e.target.result;
    const data = await api('POST', `/api/projects/${id}/apply-opencode`, { content });
    if (data.success && data.sessionId) {
      setCardStatus(`<span class="badge badge-green">Running</span> Session: ${data.sessionId.slice(-8)} — check Patch tab for progress`);
      await loadProjects();
      openDetail(id, 'patch');
    } else {
      setCardStatus(`<span class="badge badge-red">Failed</span> ${(data.error || '').slice(0, 100)}`);
    }
    setTimeout(() => setCardStatus(''), 12000);
  };
  reader.readAsText(file);
}

// ── Patch tab ──
function renderPatch() {
  const p = state.activeProject;
  if (!p) return;
  const el = document.getElementById('tab-patch');
  el.innerHTML = `
    <h2>Patch</h2>
    <p style="color:var(--text2);margin-bottom:12px;font-size:13px">Upload a patch file or paste content below.</p>
    <div class="action-row">
      <button class="btn btn-primary" onclick="uploadPatchFile()">📂 Choose patch &amp; apply with OpenCode</button>
      <button class="btn btn-primary" onclick="savePatch()">💾 Save Patch</button>
      <button class="btn" onclick="applyPatchGit()" style="background:var(--green);border-color:var(--green);color:#fff">▶ git apply</button>
      <button class="btn btn-primary" onclick="applyWithOpencode()">🤖 Apply with opencode</button>
      <span id="patch-status" class="status-line"></span>
    </div>
    <textarea id="patch-content" placeholder="Paste the patch content here or upload a .patch file..."></textarea>
    <input type="file" id="patch-file-input" accept=".patch,.txt,.diff" style="display:none" onchange="onPatchFileSelected(event)" />
  `;

async function loadPatchContent() {
  const p = state.activeProject;
  if (!p) return;
  const data = await api('GET', `/api/projects/${p.id}/patch`);
  document.getElementById('patch-content').value = data.content || '';
}

async function savePatch() {
  const p = state.activeProject;
  if (!p) return;

  const status = document.getElementById('patch-status');
  await api('POST', `/api/projects/${p.id}/patch`, { content });

  p.patchExists = content.length > 0;

function uploadPatchFile() {
  document.getElementById('patch-file-input').click();
}

function onPatchFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    document.getElementById('patch-content').value = e.target.result;

async function applyPatchGit() {
  const p = state.activeProject;
  if (!p) return;
  const content = document.getElementById('patch-content').value;
  const status = document.getElementById('patch-status');
  await api('POST', `/api/projects/${p.id}/patch`, { content });
  status.innerHTML = '<span class="spinner"></span> Applying patch with git...';
  const data = await api('POST', `/api/projects/${p.id}/apply-patch`);
  if (data.success) {
    status.innerHTML = `<span class="badge badge-green">Applied</span> ${data.stdout || 'Patch applied'}`;
    p.patchExists = content.length > 0;
    loadProjects();
  } else {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.stderr || data.error || 'Apply failed'}`;
  }
  setTimeout(() => status.innerHTML = '', 5000);
}

async function applyWithOpencode() {
  const p = state.activeProject;
  if (!p) return;
  const content = document.getElementById('patch-content').value;
  const status = document.getElementById('patch-status');
  status.innerHTML = '<span class="spinner"></span> Sending to opencode web API...';

  let progressEl = document.getElementById('session-progress');
  if (!progressEl) {
    progressEl = document.createElement('div');
    progressEl.id = 'session-progress';
    progressEl.className = 'session-progress open';
    document.getElementById('tab-patch').appendChild(progressEl);
  } else {
    progressEl.className = 'session-progress open';
    progressEl.innerHTML = '';
  }

  const data = await api('POST', `/api/projects/${p.id}/apply-opencode`, { content });
  if (data.success && data.sessionId) {
    p.opencodeSessionId = data.sessionId;
    status.innerHTML = `<span class="badge badge-green">Launched</span> Session: ${data.sessionId.slice(-8)}`;
    pollSessionProgress(p.id, progressEl);
  } else {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.error || 'Failed'}`;
    progressEl.className = 'session-progress';
  }
}

async function pollSessionProgress(projectId, progressEl) {
  try {
    const res = await api('GET', `/api/projects/${projectId}/opencode-session`);
    if (!res.active) {
      progressEl.innerHTML = '<h3>Session complete</h3><p style="color:var(--green);font-size:13px">OpenCode has finished processing.</p>';
      loadProjects();
      setTimeout(() => { progressEl.className = 'session-progress'; }, 10000);
      return;
    }
    let html = `<h3>OpenCode Progress</h3><p style="font-size:11px;color:var(--text2);margin-bottom:8px">Session: ${res.sessionId || ''}</p>`;
    if (res.todos && res.todos.length > 0) {
      html += '<div style="margin-bottom:8px">';
      res.todos.forEach(t => {
        const cls = t.status === 'completed' ? 'done' : 'pending';
        const icon = t.status === 'completed' ? '✓' : t.status === 'in_progress' ? '◉' : '○';
        html += `<div class="todo-item ${cls}"><span>${icon}</span> ${t.content}</div>`;
      });
      html += '</div>';
    }
    if (res.messages && res.messages.length > 0) {
      const lastMsg = res.messages[res.messages.length - 1];
      if (lastMsg.parts && lastMsg.parts.length > 0) {
        const textPart = lastMsg.parts.find(p => p.type === 'text' || p.text);
        if (textPart) {
          const text = (textPart.text || '').slice(-500);
          html += `<div class="msg-preview"><span class="role">${lastMsg.role}:</span> ${escapeHtml(text)}</div>`;
        }
      }
    }
    progressEl.innerHTML = html;
  } catch(e) {
    progressEl.innerHTML = `<p style="color:var(--red)">Polling error: ${e.message}</p>`;
    return;
  }
  if (progressEl.className.includes('open')) {
    setTimeout(() => pollSessionProgress(projectId, progressEl), 3000);
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function checkExistingSession(projectId) {
  const res = await api('GET', `/api/projects/${projectId}/opencode-session`);
  if (!res || !res.active) return;
  let progressEl = document.getElementById('session-progress');
  if (!progressEl) {
    progressEl = document.createElement('div');
    progressEl.id = 'session-progress';
    progressEl.className = 'session-progress open';
    document.getElementById('tab-patch').appendChild(progressEl);
  } else {
    progressEl.className = 'session-progress open';
  }
  document.getElementById('patch-status').innerHTML = `<span class="badge badge-green">Running</span> Session: ${res.sessionId ? res.sessionId.slice(-8) : ''}`;
  pollSessionProgress(projectId, progressEl);
}

// ── Git tab ──
function renderGit() {
  const p = state.activeProject;
  if (!p) return;
  const el = document.getElementById('tab-git');
  el.innerHTML = `
    <h2>Git</h2>
    <div class="stats">
      <div class="stat"><div class="val" id="g-branch">—</div><div class="label">Branch</div></div>
      <div class="stat"><div class="val" id="g-status">—</div><div class="label">Status</div></div>
    </div>
    <h3>Commit</h3>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input type="text" id="commit-msg" placeholder="Commit message..." style="flex:1" />
      <button class="btn btn-green" onclick="runCommit()">Commit</button>
    </div>
    <h3>Merge</h3>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input type="text" id="merge-branch" placeholder="Branch to merge" style="flex:1" />
      <button class="btn btn-primary" onclick="runMerge()">Merge</button>
    </div>
    <span id="git-status-line" class="status-line"></span>
    <h3>Status Output</h3>
    <pre class="output" id="git-output">Loading...</pre>
  `;
  loadGitStatus();
}

async function loadGitStatus() {
  const p = state.activeProject;
  if (!p) return;
  const data = await api('GET', `/api/projects/${p.id}/status`);
  const el = document.getElementById('git-output');
  if (data.error) { el.textContent = data.error; return; }
  document.getElementById('g-branch').textContent = data.branch || '—';
  document.getElementById('g-status').textContent = data.dirty ? '⚠ Modified' : '✓ Clean';
  el.textContent = data.status || '(clean)';
}

async function runCommit() {
  const p = state.activeProject;
  if (!p) return;
  const msg = document.getElementById('commit-msg').value || 'update';
  const status = document.getElementById('git-status-line');
  status.innerHTML = '<span class="spinner"></span> Committing...';
  const data = await api('POST', `/api/projects/${p.id}/commit`, { message: msg });
  if (data.success) {
    status.innerHTML = `<span class="badge badge-green">Committed</span> ${data.stdout || ''}`;
    document.getElementById('commit-msg').value = '';
    loadGitStatus();
    loadProjects();
  } else {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.stderr || data.error || 'Nothing to commit'}`;
  }
  setTimeout(() => status.innerHTML = '', 4000);
}

async function runMerge() {
  const p = state.activeProject;
  if (!p) return;
  const branch = document.getElementById('merge-branch').value.trim();
  if (!branch) return;
  const status = document.getElementById('git-status-line');
  status.innerHTML = `<span class="spinner"></span> Merging ${branch}...`;
  const data = await api('POST', `/api/projects/${p.id}/merge`, { branch });
  if (data.success) {
    status.innerHTML = `<span class="badge badge-green">Merged</span> ${data.stdout || ''}`;
    loadGitStatus();
    loadProjects();
  } else {
    status.innerHTML = `<span class="badge badge-red">Error</span> ${data.stderr || data.error || 'Merge failed'}`;
  }
  setTimeout(() => status.innerHTML = '', 4000);
}

// ── Sessions tab ──
function renderSessions() {
  const p = state.activeProject;
  if (!p) return;
  const el = document.getElementById('tab-sessions');
  el.innerHTML = `<div class="action-row"><h2 style="margin-bottom:0">Session History</h2><div class="spacer"></div><button class="btn btn-sm" onclick="clearSessions()">Clear</button></div><div id="session-list"><span class="spinner"></span> Loading...</div>`;
  loadSessionsContent();
}

async function loadSessionsContent() {
  const p = state.activeProject;
  if (!p) return;
  const data = await api('GET', `/api/projects/${p.id}/sessions`);
  const list = document.getElementById('session-list');
  if (!data.sessions || !data.sessions.length) {
    list.innerHTML = '<p style="color:var(--text2);font-size:13px">No sessions yet.</p>';
    return;
  }
  list.innerHTML = '<div class="session-list">' + data.sessions.map(s => {
    const cls = s.action || 'unknown';
    let detail = '';
    if (s.action === 'combine') detail = `${(s.lines || 0).toLocaleString()} lines, ${s.size ? (s.size / 1024).toFixed(1) + ' KB' : '—'}`;
    else if (s.action === 'commit') detail = s.message || '';
    else if (s.action === 'merge') detail = s.branch || '';
    else if (s.action === 'patch_save') detail = `${(s.size || 0).toLocaleString()} chars`;
    return `<div class="session-item"><span class="time">${new Date(s.timestamp).toLocaleString()}</span><span class="action ${cls}">${s.action.replace('_', ' ')}</span><span class="detail">${detail}</span></div>`;
  }).join('') + '</div>';
}

async function clearSessions() {
  const p = state.activeProject;
  if (!p) return;
  await api('POST', `/api/projects/${p.id}/sessions/clear`);
  renderSessions();
}

let pathTimeout = null;
let pathSelectedIndex = -1;

function onPathInput() {
  clearTimeout(pathTimeout);
  const el = document.getElementById('new-path');
  pathSelectedIndex = -1;
  if (el.value.length < 2) { hideAutocomplete(); return; }
  pathTimeout = setTimeout(() => fetchAutocomplete(el.value), 120);
}

function onPathKeydown(e) {
  const dd = document.getElementById('path-dropdown');
  if (!dd.classList.contains('open')) return;
  const items = dd.querySelectorAll('div');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    pathSelectedIndex = Math.min(pathSelectedIndex + 1, items.length - 1);
    highlightPath(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    pathSelectedIndex = Math.max(pathSelectedIndex - 1, 0);
    highlightPath(items);
  } else if (e.key === 'Enter' && pathSelectedIndex >= 0) {
    e.preventDefault();
    items[pathSelectedIndex].click();
  } else if (e.key === 'Tab' && pathSelectedIndex >= 0) {
    e.preventDefault();
    items[pathSelectedIndex].click();
  } else if (e.key === 'Escape') {
    hideAutocomplete();
  }
}

function highlightPath(items) {
  items.forEach((el, i) => el.classList.toggle('selected', i === pathSelectedIndex));
  if (items[pathSelectedIndex]) items[pathSelectedIndex].scrollIntoView({ block: 'nearest' });
}

function hideAutocomplete() {
  document.getElementById('path-dropdown').classList.remove('open');
}

async function fetchAutocomplete(prefix) {
  const data = await api('GET', `/api/browse?prefix=${encodeURIComponent(prefix)}`);
  const dd = document.getElementById('path-dropdown');
  if (!data.entries || !data.entries.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = data.entries.map(e => `<div onmousedown="pickPath('${e.replace(/'/g, "\\'")}')">${e}</div>`).join('');
  dd.classList.add('open');
}

function pickPath(p) {
  document.getElementById('new-path').value = p;
  hideAutocomplete();
  document.getElementById('new-path').focus();
}

// ── Visual Folder Picker ──
let browseHistory = [];

function openFolderPicker() {
  browseHistory = [];
  document.getElementById('folder-modal').classList.add('open');
  const currentPath = document.getElementById('new-path').value.trim() || '/';
  loadFolderContents(currentPath);
}

function closeFolderPicker() {
  document.getElementById('folder-modal').classList.remove('open');
  browseHistory = [];
}

function browseRoot(root) {
  browseHistory = [];
  loadFolderContents(root);
}

function browseGoUp() {
  const pathInput = document.getElementById('browse-path-readonly');
  const current = pathInput.value;
  const parent = current === '/' ? null : current.replace(/\/+$/, '').split('/').slice(0, -1).join('/') || '/';
  if (parent) loadFolderContents(parent);
}

async function loadFolderContents(dir) {
  const list = document.getElementById('folder-list');
  const pathInput = document.getElementById('browse-path-readonly');
  pathInput.value = dir;
  list.innerHTML = '<div style="padding:12px;color:var(--text2)"><span class="spinner"></span> Loading...</div>';
  const data = await api('GET', `/api/browse?prefix=${encodeURIComponent(dir)}`);
  if (!data.entries || !data.entries.length) {
    list.innerHTML = '<div style="padding:12px;color:var(--text2)">(empty folder)</div>';
    return;
  }
  list.innerHTML = data.entries.map(e => {
    const name = e.split('/').filter(Boolean).pop() || e;
    return `<div onmousedown="navigateFolder('${e.replace(/'/g, "\\'")}')" style="padding:6px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;transition:background 0.1s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">📁 ${name}</div>`;
  }).join('');
}

function navigateFolder(dir) {
  const pathInput = document.getElementById('browse-path-readonly');
  browseHistory.push(pathInput.value);
  loadFolderContents(dir);
}

function selectFolder() {
  const path = document.getElementById('browse-path-readonly').value;
  document.getElementById('new-path').value = path;
  closeFolderPicker();
  document.getElementById('new-path').focus();
}

// ── Add Project Modal ──
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('new-name').value = '';
  document.getElementById('new-path').value = '';
  document.getElementById('new-script').value = '';
  document.getElementById('detect-result').style.display = 'none';
  document.getElementById('combine-script-group').style.display = 'none';
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

async function detectFolder() {
  const path = document.getElementById('new-path').value.trim();
  if (!path) return;
  const result = document.getElementById('detect-result');
  result.style.display = 'block';
  result.innerHTML = '<span class="spinner"></span> Scanning...';
  const data = await api('POST', '/api/projects/detect', { path });
  if (data.error) {
    result.innerHTML = `<span class="badge badge-red">Error</span> ${data.error}`;
    return;
  }
  result.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px">
      <span>📁 ${data.name}</span>
      <span>${data.hasGit ? '✓ git' : '✗ no git'}</span>
      <span>📄 ${data.fileCount} files</span>
    </div>
    ${data.sourceExtensions.length ? `<div>Source: ${data.sourceExtensions.join(', ')}</div>` : ''}
  `;
  if (!document.getElementById('new-name').value) {
    document.getElementById('new-name').value = data.name;
  }
  document.getElementById('combine-script-group').style.display = 'block';
}

async function createProject() {
  const name = document.getElementById('new-name').value.trim();
  const path = document.getElementById('new-path').value.trim();
  const script = document.getElementById('new-script').value.trim() || undefined;
  if (!name || !path) return;
  const data = await api('POST', '/api/projects', { name, path, combineScript: script });
  if (data.error) { alert(data.error); return; }
  closeAddModal();
  await loadProjects();
  openDetail(data.id);
}

async function deleteProject(id, name) {
  if (!confirm(`Delete project "${name}"? This cannot be undone.`)) return;
  await api('DELETE', `/api/projects/${id}`);
  if (state.activeProject?.id === id) closeDetail();
  await loadProjects();
}

loadProjects();
